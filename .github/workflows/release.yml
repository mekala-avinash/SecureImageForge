name: release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g. v0.2.0)"
        required: true

permissions:
  contents: write
  id-token: write    # cosign keyless

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-latest,     target: aarch64-apple-darwin,        platform: darwin/arm64 }
          - { os: macos-13,         target: x86_64-apple-darwin,         platform: darwin/amd64 }
          - { os: ubuntu-latest,    target: x86_64-unknown-linux-gnu,    platform: linux/amd64  }
          - { os: ubuntu-24.04-arm, target: aarch64-unknown-linux-gnu,   platform: linux/arm64  }
          - { os: windows-latest,   target: x86_64-pc-windows-msvc,      platform: windows/amd64 }
          - { os: windows-latest,   target: aarch64-pc-windows-msvc,      platform: windows/arm64 }
    defaults:
      run:
        working-directory: forge
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: forge
      - uses: sigstore/cosign-installer@v3
      - uses: anchore/sbom-action/download-syft@v0

      - name: install cargo-auditable
        run: cargo install cargo-auditable --locked

      - name: compile and package single-distribution bundles
        env:
          CARGO: cargo-auditable
          MATRIX_PLATFORM: ${{ matrix.platform }}
          MATRIX_TARGET: ${{ matrix.target }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$MATRIX_PLATFORM" == darwin/* ]]; then
            cargo xtask dist-mac --target "$MATRIX_TARGET"
            cargo xtask dmg-mac
          elif [[ "$MATRIX_PLATFORM" == linux/* ]]; then
            cargo xtask dist-linux --target "$MATRIX_TARGET"
          else
            cargo xtask dist --target "$MATRIX_TARGET"
          fi

      - name: stage artifacts + sbom + cosign attest
        env:
          COSIGN_EXPERIMENTAL: "1"
        shell: bash
        run: |
          set -euo pipefail
          # Find all distribution packages (*.tar.gz, *.zip, *.dmg)
          for f in dist/*.tar.gz dist/*.zip dist/*.dmg; do
            [ -f "$f" ] || continue
            echo "Processing package: $f"
            
            # Detached cosign signature.
            cosign sign-blob --yes \
              --output-signature "$f.sig" \
              "$f"

            # Extract CycloneDX SBOM from the package archive/installer itself.
            syft "$f" -o cyclonedx-json="$f.cdx.json" || true

            if [ -f "$f.cdx.json" ]; then
              # In-toto attestation binding the SBOM to the package.
              cosign attest-blob --yes \
                --predicate "$f.cdx.json" \
                --type cyclonedx \
                --output-attestation "$f.intoto.jsonl" \
                "$f"
            fi
          done

      - uses: actions/upload-artifact@v7
        with:
          name: artifacts-${{ matrix.target }}
          path: forge/dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: sigstore/cosign-installer@v3

      - name: assemble release manifest.json
        env:
          REF_NAME: ${{ github.ref_name }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${INPUT_TAG:-$REF_NAME}"
          version="${tag#v}"
          published_at=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          {
            printf '{"version":"%s","published_at":"%s","channel":"stable","min_required":null,"releases":[' "$version" "$published_at"
            first=true
            for f in dist/forge-* dist/SecureImageForge-*; do
              [ -f "$f" ] || continue
              case "$f" in *.sig|*.cdx.json|*.intoto.jsonl|*.json) continue;; esac
              base=$(basename "$f")
              sha=$(sha256sum "$f" | awk '{print $1}')
              size=$(stat -c '%s' "$f" 2>/dev/null || stat -f '%z' "$f")
              
              if [[ "$base" =~ ^forge-(.+)\.(tar\.gz|zip)$ ]]; then
                platform=$(echo "${BASH_REMATCH[1]}" | tr '-' '/')
              elif [[ "$base" =~ ^SecureImageForge-(.+)\.dmg$ ]]; then
                platform=$(echo "${BASH_REMATCH[1]}" | tr '-' '/')
              else
                continue
              fi
              
              entry=$(printf '{"platform":"%s","url":"%s","sha256":"%s","signature_url":"%s.sig","size_bytes":%s}' "$platform" "$base" "$sha" "$base" "$size")
              if [ "$first" = "true" ]; then first=false; else printf ','; fi
              printf '%s' "$entry"
            done
            printf ']}'
          } > manifest.json
          cat manifest.json

      - name: cosign sign manifest
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: cosign sign-blob --yes --output-signature manifest.json.sig manifest.json

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/**
            manifest.json
            manifest.json.sig
          generate_release_notes: true
