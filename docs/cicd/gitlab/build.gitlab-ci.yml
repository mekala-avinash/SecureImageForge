stages: [pre-flight, build, scan, sign-attest, gitops]

variables:
  IMAGE_REPO: $CI_REGISTRY_IMAGE
  BUILDKIT_INLINE_CACHE: "1"
  DOCKER_BUILDKIT: "1"

.default_runner: &default_runner
  image: registry.acme.io/tooling/multi:1.0.0@sha256:REPLACE
  tags: [hardened-runner]

secret-scan:
  <<: *default_runner
  stage: pre-flight
  script: [ "gitleaks detect --source . --redact --exit-code 1" ]

sast:
  <<: *default_runner
  stage: pre-flight
  script: [ "semgrep ci --config p/owasp-top-ten --error" ]

sca:
  <<: *default_runner
  stage: pre-flight
  script: [ "osv-scanner -r . --fail-on-vuln" ]

iac-scan:
  <<: *default_runner
  stage: pre-flight
  script: [ "checkov -d infra/ --quiet --soft-fail-on LOW" ]
  rules: [ { changes: ["infra/**/*"] } ]

build:
  <<: *default_runner
  stage: build
  id_tokens: { SIGSTORE_ID_TOKEN: { aud: sigstore } }
  script:
    - export SOURCE_DATE_EPOCH=$(git log -1 --pretty=%ct)
    - buildctl-daemonless.sh build
        --frontend dockerfile.v0
        --local context=. --local dockerfile=.
        --opt platform=linux/amd64,linux/arm64
        --output type=image,name=$IMAGE_REPO:$CI_COMMIT_SHA,push=true,rewrite-timestamp=true
    - echo "DIGEST=$(crane digest $IMAGE_REPO:$CI_COMMIT_SHA)" >> build.env
  artifacts: { reports: { dotenv: build.env } }

scan:
  <<: *default_runner
  stage: scan
  script:
    - trivy image --severity CRITICAL,HIGH --exit-code 1 $IMAGE_REPO@$DIGEST
    - grype $IMAGE_REPO@$DIGEST --fail-on high
    - syft  $IMAGE_REPO@$DIGEST -o spdx-json > sbom.spdx.json
  artifacts: { paths: [sbom.spdx.json] }

sign-attest:
  <<: *default_runner
  stage: sign-attest
  id_tokens: { SIGSTORE_ID_TOKEN: { aud: sigstore } }
  script:
    - export COSIGN_EXPERIMENTAL=1
    - cosign sign --yes $IMAGE_REPO@$DIGEST
    - cosign attest --yes --type spdxjson --predicate sbom.spdx.json $IMAGE_REPO@$DIGEST
    - cosign verify $IMAGE_REPO@$DIGEST --certificate-identity-regexp '^https://gitlab.acme.io/.+' --certificate-oidc-issuer https://gitlab.acme.io

gitops-bump:
  <<: *default_runner
  stage: gitops
  script:
    - git clone https://oauth2:$GITOPS_TOKEN@gitlab.acme.io/platform/gitops.git
    - cd gitops && yq -i ".spec.values.image.digest=\"$DIGEST\"" apps/$CI_PROJECT_NAME/overlays/staging/values.yaml
    - git commit -am "bump $CI_PROJECT_NAME → $DIGEST" && git push -o merge_request.create
