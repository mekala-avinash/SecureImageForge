# OpenTelemetry Collector — gateway deployment per cluster
apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata: { name: otel-gateway, namespace: observability }
spec:
  mode: deployment
  replicas: 6
  image: ghcr.io/open-telemetry/opentelemetry-collector-contrib:0.110.0
  config:
    receivers:
      otlp:
        protocols:
          grpc: { endpoint: 0.0.0.0:4317 }
          http: { endpoint: 0.0.0.0:4318 }
      prometheus:
        config:
          scrape_configs:
            - job_name: kube-state
              static_configs: [{ targets: ["kube-state-metrics.kube-system:8080"] }]
    processors:
      batch:        { send_batch_size: 8192, timeout: 5s }
      memory_limiter: { check_interval: 5s, limit_mib: 1500, spike_limit_mib: 256 }
      resource:
        attributes:
          - { key: deployment.environment, value: ${env:CLUSTER_ENV}, action: insert }
          - { key: cloud.region,           value: ${env:CLOUD_REGION},  action: insert }
      attributes/redact:
        actions:
          - { key: http.request.header.authorization, action: delete }
          - { key: http.request.header.cookie,        action: delete }
          - { key: user.email, action: hash }
      tail_sampling:
        decision_wait: 10s
        policies:
          - { name: errors,  type: status_code, status_code: { status_codes: [ERROR] } }
          - { name: slow,    type: latency,     latency:     { threshold_ms: 500 } }
          - { name: rate,    type: probabilistic, probabilistic: { sampling_percentage: 5 } }
    exporters:
      otlphttp/tempo:        { endpoint: http://tempo-distributor.observability:4318 }
      prometheusremotewrite: { endpoint: http://mimir.observability:9009/api/v1/push }
      loki:                  { endpoint: http://loki-gateway.observability/loki/api/v1/push }
    service:
      telemetry:
        metrics: { address: 0.0.0.0:8888 }
        logs: { level: info }
      pipelines:
        traces:  { receivers: [otlp], processors: [memory_limiter, attributes/redact, tail_sampling, batch, resource], exporters: [otlphttp/tempo] }
        metrics: { receivers: [otlp, prometheus], processors: [memory_limiter, batch, resource], exporters: [prometheusremotewrite] }
        logs:    { receivers: [otlp], processors: [memory_limiter, attributes/redact, batch, resource], exporters: [loki] }
