# loki-values.yaml — Grafana Loki SSD-mode for cost-efficient prod
# Place under gitops/platform/observability/loki/values.yaml

deploymentMode: SimpleScalable

loki:
  auth_enabled: true                # tenant isolation
  schemaConfig:
    configs:
      - from: "2026-01-01"
        store: tsdb
        object_store: s3
        schema: v13
        index: { prefix: loki_index_, period: 24h }
  storage:
    type: s3
    s3:
      region: us-east-1
      bucketNames:
        chunks: acme-loki-chunks
        ruler:  acme-loki-ruler
        admin:  acme-loki-admin
      s3ForcePathStyle: false
  limits_config:
    retention_period: 90d                # hot retention
    max_query_length: 720h
    ingestion_rate_mb: 16
    ingestion_burst_size_mb: 32
    per_stream_rate_limit: 8MB
    per_stream_rate_limit_burst: 16MB
    split_queries_by_interval: 30m
  compactor:
    retention_enabled: true
    delete_request_store: s3
    working_directory: /var/loki/compactor
  ruler:
    storage:
      type: s3
      s3: { bucketnames: acme-loki-ruler }
    enable_api: true
    alertmanager_url: http://alertmanager.observability:9093

write:
  replicas: 3
  persistence: { size: 50Gi, storageClass: gp3 }
  resources:
    requests: { cpu: 500m, memory: 1Gi }
    limits:   { cpu: 2,    memory: 4Gi }
  podSecurityContext: { runAsNonRoot: true, runAsUser: 10001, fsGroup: 10001, seccompProfile: { type: RuntimeDefault } }

read:
  replicas: 3
  persistence: { size: 20Gi, storageClass: gp3 }
  resources:
    requests: { cpu: 500m, memory: 1Gi }
    limits:   { cpu: 2,    memory: 4Gi }

backend:
  replicas: 3
  persistence: { size: 20Gi, storageClass: gp3 }
  resources:
    requests: { cpu: 250m, memory: 512Mi }
    limits:   { cpu: 1,    memory: 2Gi }

gateway:
  enabled: true
  replicas: 2
  resources: { requests: { cpu: 100m, memory: 128Mi }, limits: { cpu: 500m, memory: 256Mi } }

serviceAccount:
  create: true
  annotations:
    # IRSA — least-privilege S3 access to the three buckets
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT:role/loki-s3-irsa

monitoring:
  selfMonitoring: { enabled: false }    # use Prometheus
  serviceMonitor: { enabled: true, labels: { release: kube-prometheus-stack } }
  dashboards:     { enabled: false }   # provisioned via grafana-operator from Git
