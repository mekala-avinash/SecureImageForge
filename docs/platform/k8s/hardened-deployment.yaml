apiVersion: apps/v1
kind: Deployment
metadata:
  name: orders-api
  namespace: prod-orders-api
  labels: { app: orders-api, tier: edge, team: orders }
spec:
  replicas: 6
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxSurge: 25%, maxUnavailable: 0 }
  selector: { matchLabels: { app: orders-api } }
  template:
    metadata:
      labels: { app: orders-api, version: v1.42.0 }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port:   "8080"
        prometheus.io/path:   "/metrics"
    spec:
      automountServiceAccountToken: false
      serviceAccountName: orders-api
      priorityClassName: production
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile: { type: RuntimeDefault }
      topologySpreadConstraints:
        - { maxSkew: 1, topologyKey: topology.kubernetes.io/zone, whenUnsatisfiable: DoNotSchedule, labelSelector: { matchLabels: { app: orders-api } } }
        - { maxSkew: 1, topologyKey: kubernetes.io/hostname,      whenUnsatisfiable: ScheduleAnyway, labelSelector: { matchLabels: { app: orders-api } } }
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: topology.kubernetes.io/zone
                labelSelector: { matchLabels: { app: orders-api } }
      tolerations:
        - { key: dedicated, operator: Equal, value: orders, effect: NoSchedule }
      containers:
        - name: app
          image: registry.acme.io/orders/api@sha256:DEADBEEF
          imagePullPolicy: IfNotPresent
          ports: [{ name: http, containerPort: 8080, protocol: TCP }]
          env:
            - { name: PORT, value: "8080" }
            - { name: OTEL_EXPORTER_OTLP_ENDPOINT, value: "http://otel-gateway.observability:4317" }
            - { name: OTEL_SERVICE_NAME, value: "orders-api" }
            - { name: OTEL_RESOURCE_ATTRIBUTES, value: "deployment.environment=prod" }
          envFrom:
            - secretRef: { name: orders-api-db-creds, optional: false }     # via External Secrets / CSI
          resources:
            requests: { cpu: 200m, memory: 256Mi, ephemeral-storage: 100Mi }
            limits:   { cpu: "1",  memory: 512Mi, ephemeral-storage: 500Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities: { drop: ["ALL"] }
          startupProbe:   { httpGet: { path: /healthz, port: http }, failureThreshold: 30, periodSeconds: 2 }
          livenessProbe:  { httpGet: { path: /healthz, port: http }, periodSeconds: 10, timeoutSeconds: 2, failureThreshold: 3 }
          readinessProbe: { httpGet: { path: /ready,   port: http }, periodSeconds: 5,  timeoutSeconds: 2, failureThreshold: 3 }
          lifecycle:
            preStop: { exec: { command: ["/bin/sh", "-c", "sleep 10"] } }   # drain
          volumeMounts:
            - { name: tmp,         mountPath: /tmp }
            - { name: cache,       mountPath: /var/cache/app }
            - { name: secrets,     mountPath: /var/run/secrets/app, readOnly: true }
      volumes:
        - { name: tmp,    emptyDir: { sizeLimit: 64Mi, medium: Memory } }
        - { name: cache,  emptyDir: { sizeLimit: 256Mi } }
        - name: secrets
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes: { secretProviderClass: orders-api-vault }
---
apiVersion: v1
kind: Service
metadata: { name: orders-api, namespace: prod-orders-api, labels: { app: orders-api } }
spec:
  selector: { app: orders-api }
  ports: [{ name: http, port: 80, targetPort: http, protocol: TCP }]
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: { name: orders-api, namespace: prod-orders-api }
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: orders-api }
  minReplicas: 6
  maxReplicas: 60
  metrics:
    - type: Resource
      resource: { name: cpu, target: { type: Utilization, averageUtilization: 60 } }
    - type: Pods
      pods:
        metric: { name: http_requests_per_second }
        target: { type: AverageValue, averageValue: "200" }
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies: [{ type: Percent, value: 25, periodSeconds: 60 }]
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - { type: Percent, value: 100, periodSeconds: 30 }
        - { type: Pods,    value: 8,   periodSeconds: 30 }
      selectPolicy: Max
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata: { name: orders-api, namespace: prod-orders-api }
spec:
  minAvailable: 75%
  selector: { matchLabels: { app: orders-api } }
