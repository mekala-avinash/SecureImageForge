# ArgoCD Application that installs the service Helm chart from the service repo.
# The image digest is pinned via the overlay-supplied values.yaml.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: SERVICE_NAME-ENV
  namespace: argocd
  finalizers: [resources-finalizer.argocd.argoproj.io]
spec:
  project: tenants
  source:
    repoURL: https://github.com/acme/SERVICE_NAME
    targetRevision: HEAD
    path: helm
    helm:
      releaseName: SERVICE_NAME
      valueFiles:
        - values.yaml                  # baked into the chart
        - ../../overlays/ENV/values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: SERVICE_NAMESPACE
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=false        # namespace.yaml owns this
      - ServerSideApply=true
      - PruneLast=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 5
      backoff: { duration: 10s, factor: 2, maxDuration: 5m }
