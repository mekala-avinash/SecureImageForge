# SecretProviderClass — binds Vault secrets to a CSI volume mounted at /etc/secrets.
# The service consumes /etc/secrets/* (read-only); the Kubernetes Secret mirror is
# also synced so envFrom can be used when applications cannot read from the FS.
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: SERVICE_NAME-secrets
spec:
  provider: vault
  parameters:
    vaultAddress: https://vault.acme.io
    roleName: SERVICE_NAME
    objects: |
      - objectName: db-password
        secretPath: kv/data/SERVICE_NAME/db
        secretKey:  password
      - objectName: api-key
        secretPath: kv/data/SERVICE_NAME/api
        secretKey:  key
  secretObjects:
    - secretName: SERVICE_NAME-env
      type: Opaque
      data:
        - objectName: db-password
          key: DB_PASSWORD
        - objectName: api-key
          key: API_KEY
