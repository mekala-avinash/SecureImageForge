apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
  - rollout.yaml
namespace: SERVICE_NAME-prod
patches:
  - target: { kind: Namespace, name: SERVICE_NAMESPACE }
    patch: |-
      - op: replace
        path: /metadata/name
        value: SERVICE_NAME-prod
  - target: { kind: Application, name: SERVICE_NAME-ENV }
    patch: |-
      - op: replace
        path: /metadata/name
        value: SERVICE_NAME-prod
      - op: replace
        path: /spec/source/helm/valueFiles/1
        value: ../../overlays/prod/values.yaml
      - op: replace
        path: /spec/destination/namespace
        value: SERVICE_NAME-prod
      - op: add
        path: /spec/syncPolicy/automated/selfHeal
        value: false
