apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
namespace: SERVICE_NAME-staging
patches:
  - target: { kind: Namespace, name: SERVICE_NAMESPACE }
    patch: |-
      - op: replace
        path: /metadata/name
        value: SERVICE_NAME-staging
  - target: { kind: Application, name: SERVICE_NAME-ENV }
    patch: |-
      - op: replace
        path: /metadata/name
        value: SERVICE_NAME-staging
      - op: replace
        path: /spec/source/helm/valueFiles/1
        value: ../../overlays/staging/values.yaml
      - op: replace
        path: /spec/destination/namespace
        value: SERVICE_NAME-staging
