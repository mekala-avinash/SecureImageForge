apiVersion: kyverno.io/v2beta1
kind: ClusterPolicy
metadata:
  name: verify-images
  annotations:
    policies.kyverno.io/category: Supply Chain
    policies.kyverno.io/severity: high
spec:
  validationFailureAction: Enforce
  background: false
  webhookTimeoutSeconds: 30
  failurePolicy: Fail
  rules:
    # 1) Cosign keyless signature from approved subject/issuer.
    - name: require-cosign-signature
      match: { any: [{ resources: { kinds: [Pod] } }] }
      exclude:
        any:
          - { resources: { namespaces: [kube-system, kyverno, gatekeeper-system, argocd, istio-system] } }
      verifyImages:
        - imageReferences:
            - "registry.acme.io/*"
            - "*.dkr.ecr.*.amazonaws.com/acme/*"
          required: true
          mutateDigest: true
          verifyDigest: true
          attestors:
            - count: 1
              entries:
                - keyless:
                    subject: "https://github.com/acme/*"
                    issuer:  "https://token.actions.githubusercontent.com"
                    rekor: { url: "https://rekor.sigstore.dev" }

    # 2) SLSA L3 provenance attestation.
    - name: require-slsa-provenance
      match: { any: [{ resources: { kinds: [Pod] } }] }
      verifyImages:
        - imageReferences: ["registry.acme.io/*"]
          attestations:
            - type: "https://slsa.dev/provenance/v1"
              attestors:
                - entries:
                    - keyless: { subject: "https://github.com/acme/*", issuer: "https://token.actions.githubusercontent.com" }
              conditions:
                - all:
                    - { key: "{{ buildDefinition.buildType }}", operator: Equals, value: "https://slsa-framework.github.io/github-actions-buildtypes/workflow/v1" }

    # 3) SPDX SBOM attestation present.
    - name: require-sbom-attestation
      match: { any: [{ resources: { kinds: [Pod] } }] }
      verifyImages:
        - imageReferences: ["registry.acme.io/*"]
          attestations:
            - type: "https://spdx.dev/Document"
              attestors:
                - entries:
                    - keyless: { subject: "https://github.com/acme/*", issuer: "https://token.actions.githubusercontent.com" }
