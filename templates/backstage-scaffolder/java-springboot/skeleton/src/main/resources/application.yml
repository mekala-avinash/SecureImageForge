spring:
  application:
    name: {{service_name}}
  threads:
    virtual:
      enabled: true

server:
  port: ${PORT:8080}
  shutdown: graceful

# Graceful shutdown drain window — Pod terminationGracePeriodSeconds must be longer.
spring.lifecycle.timeout-per-shutdown-phase: ${DRAIN_TIMEOUT:25s}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
      team: {{team}}
  tracing:
    sampling:
      probability: ${OTEL_TRACES_SAMPLER_ARG:1.0}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:}
      transport: grpc

logging:
  pattern:
    level: '%5p [${spring.application.name},%X{traceId:-},%X{spanId:-}]'
